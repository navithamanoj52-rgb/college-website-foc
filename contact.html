<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novus | Apply</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: white; }
        nav { background: #0f2027; padding: 1rem; text-align: center; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }
        .form-area { padding: 30px 20px; max-width: 450px; margin: auto; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box;}
        button { background: #00d2ff; color: white; font-weight: bold; border: none; font-size: 16px; cursor: pointer;}
    </style>
</head>
<body>
<nav>
    <a href="index.html">Home</a>
    <a href="about.html">Branches</a>
    <a href="contact.html">Apply Now</a>
</nav>
<div class="form-area">
    <h2>Admission Inquiry</h2>
    <p>Start your journey with Novus Institute today.</p>
    <form onsubmit="event.preventDefault(); alert('Inquiry received! Novus Admissions will contact you soon.');">
        <input type="text" placeholder="Full Name" required>
        <input type="email" placeholder="Email Address" required>
        <select required>
            <option value="">-- Choose Branch --</option>
            <option>CSE (AI)</option>
            <option>Electronics</option>
        </select>
        <button type="submit">Submit Inquiry</button>
    </form>
</div>
</body>
</html>
